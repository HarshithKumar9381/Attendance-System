<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anurag University - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-1: #f2f5ff;
      --bg-2: #e8fff8;
      --ink: #0f172a;
      --ink-soft: #334155;
      --card: rgba(255, 255, 255, 0.95);
      --line: rgba(15, 23, 42, 0.12);
      --primary: #0f766e;
      --primary-dark: #115e59;
      --accent: #f59e0b;
      --danger: #b91c1c;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 20%, var(--bg-1), #d1fae5 70%, var(--bg-2));
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aurora {
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(52px);
      opacity: 0.35;
      z-index: 0;
      animation: float 11s ease-in-out infinite;
    }

    .aurora-1 {
      top: -80px;
      right: 10%;
      background: #fb7185;
    }

    .aurora-2 {
      bottom: -90px;
      left: 5%;
      background: #2dd4bf;
      animation-delay: -4s;
    }

    @keyframes float {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-18px, 22px);
      }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
      padding: 2.5rem;
      animation: slideUp 500ms ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: var(--primary);
      font-weight: 700;
    }

    .login-header p {
      margin: 0.5rem 0 0;
      color: var(--ink-soft);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
      display: grid;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink);
      display: block;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: #ffffff;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: #f8fffe;
    }

    .form-group input::placeholder {
      color: var(--ink-soft);
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem 1.2rem;
      background: var(--primary);
      color: #ffffff;
      border: 0;
      border-radius: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 200ms ease, transform 120ms ease;
      margin-top: 0.5rem;
    }

    .login-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 400ms ease;
    }

    @keyframes shake {
      0%,
      100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-8px);
      }
      75% {
        transform: translateX(8px);
      }
    }

    .success-message {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 8px;
      color: #16a34a;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .success-message.show {
      display: block;
      animation: slideUp 400ms ease;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--ink-soft);
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      padding: 1rem;
    }

    .popup-overlay.hidden {
      display: none;
    }

    .popup-card {
      width: min(380px, 92vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
      padding: 1.4rem;
      animation: slideUp 220ms ease;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
      color: var(--danger);
      font-weight: 700;
    }

    .popup-message {
      margin: 0;
      color: var(--ink);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .popup-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
    }

    .popup-ok-btn {
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      transition: background 200ms ease;
    }

    .popup-ok-btn:hover {
      background: var(--primary-dark);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Anurag University</h1>
        <p>Faculty Login</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <input type="text" name="no-autofill-user" autocomplete="off" style="display: none;" />
        <input type="password" name="no-autofill-pass" autocomplete="new-password" style="display: none;" />
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="faculty_email_entry"
            placeholder="Enter your email"
            required
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>

        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">Login successful. Redirecting...</div>
      </form>

      <div class="login-footer">
        <p>Secure Faculty Access</p>
      </div>
    </div>
  </div>

  <div id="invalidPopup" class="popup-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="popupTitle" aria-describedby="popupMessage">
    <div class="popup-card">
      <div class="popup-header" id="popupTitle">
        <span>⚠</span>
        <span>Access Denied</span>
      </div>
      <p id="popupMessage" class="popup-message">You are not a faculty</p>
      <div class="popup-actions">
        <button id="popupOkBtn" type="button" class="popup-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
